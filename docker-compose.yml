services:
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_WHATSAPP_NUMBER: ${NEXT_PUBLIC_WHATSAPP_NUMBER:-254700000000}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      API_INTERNAL_URL: http://nginx/api
    ports: ["3000:3000"]
    depends_on: [nginx]
  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - uploads:/var/www/html/storage/app
    depends_on:
      mysql: { condition: service_healthy }
  scheduler:
    build: ./backend
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: ./backend/.env
    volumes:
      - uploads:/var/www/html/storage/app
    depends_on:
      mysql: { condition: service_healthy }
  worker:
    build: ./backend
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --backoff=30 --timeout=60 --max-time=3600
    env_file: ./backend/.env
    volumes:
      - uploads:/var/www/html/storage/app
    depends_on:
      mysql: { condition: service_healthy }
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["8000:80"]
    volumes:
      - ./backend:/var/www/html:ro
      - ./backend/.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/html/storage/app:ro
    depends_on: [api]
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sysnettech}
      MYSQL_USER: ${DB_USERNAME:-sysnettech}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-me}
    volumes: [mysql_data:/var/lib/mysql]
    healthcheck: { test: ["CMD","mysqladmin","ping","-h","localhost"], interval: 10s, timeout: 5s, retries: 10 }
volumes: { mysql_data: {}, uploads: {} }
