server { listen 80; index index.php; root /var/www/html/public; client_max_body_size 8M; location /storage/ { alias /var/www/html/storage/app/public/; try_files $uri =404; add_header X-Content-Type-Options nosniff; } location / { try_files $uri $uri/ /index.php?$query_string; } location ~ \.php$ { include fastcgi_params; fastcgi_pass api:9000; fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name; } location ~ /\. { deny all; } }
